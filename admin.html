<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>訪查排程管理後台</title>
<style>
  :root{
    --ink:#1f2937;
    --ink-soft:#5b6472;
    --line:#dfe3e8;
    --line-strong:#c4cad3;
    --bg:#f5f6f8;
    --card:#ffffff;
    --accent:#2f5fa3;
    --accent-soft:#eaf1fb;
    --accent-strong:#1e4474;
    --warn-bg:#fdece9;
    --warn-text:#a3341f;
    --ok-bg:#e9f5ee;
    --ok-text:#1f6b43;
    --radius:10px;
    font-family: -apple-system, "Segoe UI", "Noto Sans TC", "PingFang TC", "Microsoft JhengHei", sans-serif;
  }
  *{box-sizing:border-box;}
  body{margin:0;background:var(--bg);color:var(--ink);line-height:1.55;}
  .wrap{max-width:1080px;margin:0 auto;padding:24px 16px 80px;}

  .topbar{
    display:flex;justify-content:space-between;align-items:center;
    margin-bottom:22px;flex-wrap:wrap;gap:10px;
  }
  .topbar h1{font-size:19px;margin:0;font-weight:700;}
  .topbar .case-name{font-size:13px;color:var(--ink-soft);margin-top:2px;}
  .topbar-actions{display:flex;gap:8px;}

  button{font-family:inherit;cursor:pointer;}
  button.primary{
    background:var(--accent);color:#fff;border:none;
    padding:9px 16px;border-radius:8px;font-size:13.5px;font-weight:700;
  }
  button.primary:hover{background:var(--accent-strong);}
  button.secondary{
    background:#fff;border:1px solid var(--line-strong);color:var(--ink);
    padding:9px 16px;border-radius:8px;font-size:13.5px;font-weight:600;
  }
  button.secondary:hover{background:var(--bg);}
  button.danger{
    background:#fff;border:1px solid #e3b3ac;color:var(--warn-text);
    padding:6px 12px;border-radius:7px;font-size:12.5px;font-weight:600;
  }
  button.danger:hover{background:var(--warn-bg);}
  button.small{padding:6px 12px;font-size:12.5px;border-radius:7px;}
  button:disabled{opacity:.5;cursor:not-allowed;}

  .card{
    background:var(--card);border:1px solid var(--line);border-radius:var(--radius);
    padding:20px;margin-bottom:18px;
  }
  .card h2{font-size:15px;margin:0 0 14px;font-weight:700;}

  /* ---- login screen ---- */
  .login-screen{max-width:420px;margin:60px auto;}
  .login-screen .card{padding:28px 26px;}
  .login-screen h1{font-size:18px;margin:0 0 4px;}
  .login-screen .sub{color:var(--ink-soft);font-size:13px;margin-bottom:18px;}
  label{display:block;font-size:13px;font-weight:600;color:var(--ink-soft);margin:0 0 5px;}
  input[type=text], input[type=password], input[type=tel], input[type=email], textarea{
    width:100%;padding:9px 11px;border:1px solid var(--line-strong);border-radius:8px;
    font-size:14px;font-family:inherit;color:var(--ink);background:#fff;
  }
  input:focus, textarea:focus{outline:none;border-color:var(--accent);box-shadow:0 0 0 3px var(--accent-soft);}
  .field{margin-bottom:14px;}

  .msg{font-size:13px;padding:9px 12px;border-radius:8px;margin-bottom:14px;display:none;}
  .msg.show{display:block;}
  .msg.err{background:var(--warn-bg);color:var(--warn-text);}
  .msg.ok{background:var(--ok-bg);color:var(--ok-text);}

  .hide{display:none !important;}

  .tabs{display:flex;gap:4px;margin-bottom:18px;border-bottom:1px solid var(--line);}
  .tab-btn{
    background:none;border:none;padding:10px 16px;font-size:13.5px;font-weight:600;
    color:var(--ink-soft);border-bottom:2px solid transparent;margin-bottom:-1px;
  }
  .tab-btn.active{color:var(--accent-strong);border-bottom-color:var(--accent);}
  .tab-panel{display:none;}
  .tab-panel.active{display:block;}

  /* ---- calendar setup ---- */
  .month-nav{display:flex;align-items:center;gap:14px;margin-bottom:14px;}
  .month-nav .label{font-size:15px;font-weight:700;min-width:110px;text-align:center;}
  .cal-grid{
    display:grid;grid-template-columns:repeat(7,1fr);gap:6px;
  }
  .cal-dow{text-align:center;font-size:12px;color:var(--ink-soft);padding:4px 0;font-weight:600;}
  .cal-day{
    border:1px solid var(--line);border-radius:8px;padding:6px 4px;min-height:64px;
    font-size:12px;cursor:pointer;background:#fff;
    display:flex;flex-direction:column;gap:3px;
  }
  .cal-day.outside{opacity:.3;cursor:default;}
  .cal-day .d-num{font-weight:700;font-size:13px;}
  .cal-day .pill{
    font-size:10.5px;padding:2px 4px;border-radius:5px;text-align:center;
    background:var(--bg);color:var(--ink-soft);
  }
  .cal-day .pill.on{background:var(--accent);color:#fff;}
  .cal-day.has-open{border-color:var(--accent);background:var(--accent-soft);}

  .slot-edit-panel{
    margin-top:16px;padding:14px;border:1px solid var(--line);border-radius:9px;background:var(--bg);
  }
  .slot-edit-panel .date-title{font-weight:700;font-size:14px;margin-bottom:10px;}
  .toggle-row{display:flex;gap:10px;margin-bottom:10px;}
  .toggle-btn{
    flex:1;padding:9px;border:1px solid var(--line-strong);border-radius:8px;
    background:#fff;font-size:13px;font-weight:600;color:var(--ink-soft);text-align:center;
  }
  .toggle-btn.on{background:var(--accent);border-color:var(--accent);color:#fff;}

  /* ---- table ---- */
  .table-toolbar{display:flex;justify-content:space-between;align-items:center;margin-bottom:12px;gap:10px;flex-wrap:wrap;}
  .count-badge{font-size:13px;color:var(--ink-soft);}
  table.data{width:100%;border-collapse:collapse;font-size:13px;}
  table.data th{
    text-align:left;font-weight:600;color:var(--ink-soft);padding:8px 10px;
    border-bottom:1px solid var(--line);white-space:nowrap;
  }
  table.data td{padding:9px 10px;border-bottom:1px solid var(--line);vertical-align:top;}
  table.data tr:hover td{background:#fafbfc;}
  .avail-tag{
    display:inline-block;font-size:11.5px;background:var(--accent-soft);color:var(--accent-strong);
    padding:2px 6px;border-radius:5px;margin:1px 3px 1px 0;white-space:nowrap;
  }
  .row-actions{display:flex;gap:6px;white-space:nowrap;}
  .empty-state{text-align:center;padding:40px 16px;color:var(--ink-soft);font-size:14px;}

  /* ---- modal ---- */
  .modal-overlay{
    position:fixed;inset:0;background:rgba(20,24,30,.45);
    display:none;align-items:flex-start;justify-content:center;
    overflow-y:auto;padding:40px 16px;z-index:50;
  }
  .modal-overlay.show{display:flex;}
  .modal{
    background:#fff;border-radius:12px;max-width:560px;width:100%;
    padding:24px;
  }
  .modal h3{margin:0 0 16px;font-size:16px;}
  .row2{display:grid;grid-template-columns:1fr 1fr;gap:12px;}
  .modal-actions{display:flex;justify-content:flex-end;gap:8px;margin-top:18px;}

  .link-box{
    display:flex;gap:8px;align-items:center;margin-top:8px;
  }
  .link-box input{font-size:12.5px;color:var(--ink-soft);background:var(--bg);}

  footer{text-align:center;font-size:12px;color:#9aa2ab;margin-top:30px;}
</style>
</head>
<body>
<div class="wrap">

  <!-- ===== Login Screen ===== -->
  <div class="login-screen" id="loginScreen">
    <div class="card">
      <h1>訪查排程管理後台</h1>
      <div class="sub">請輸入案件代碼與管理密碼以登入</div>
      <div class="msg err" id="loginMsg"></div>
      <div class="field">
        <label>案件代碼</label>
        <input type="text" id="loginCode" placeholder="例如 liuching-2026q3">
      </div>
      <div class="field">
        <label>管理密碼</label>
        <input type="password" id="loginPassword" placeholder="請輸入密碼">
      </div>
      <button class="primary" id="loginBtn" style="width:100%">登入</button>
      <div style="text-align:center;margin-top:14px;">
        <button class="secondary small" id="showCreateBtn" type="button">建立新案件</button>
      </div>

      <div id="createPanel" class="hide" style="margin-top:18px;border-top:1px solid var(--line);padding-top:18px;">
        <div class="field">
          <label>新案件代碼（英數字、不可重複，用於業者填寫連結）</label>
          <input type="text" id="newCode" placeholder="例如 liuching-2026q3">
        </div>
        <div class="field">
          <label>案件名稱</label>
          <input type="text" id="newName" placeholder="例如 六輕周邊工業區 2026 Q3 現場訪查">
        </div>
        <div class="field">
          <label>設定管理密碼</label>
          <input type="password" id="newPassword" placeholder="請設定此案件的管理密碼">
        </div>
        <div class="msg err" id="createMsg"></div>
        <button class="primary" id="createBtn" style="width:100%">建立案件並登入</button>
      </div>
    </div>
  </div>

  <!-- ===== Admin Dashboard ===== -->
  <div id="dashboard" class="hide">
    <div class="topbar">
      <div>
        <h1 id="dashTitle">管理後台</h1>
        <div class="case-name" id="dashCaseName"></div>
      </div>
      <div class="topbar-actions">
        <button class="secondary small" id="copyLinkBtn">複製業者填寫連結</button>
        <button class="secondary small" id="logoutBtn">登出</button>
      </div>
    </div>

    <div class="tabs">
      <button class="tab-btn active" data-tab="calendar">開放日期設定</button>
      <button class="tab-btn" data-tab="submissions">彙整資料</button>
    </div>

    <!-- Tab: Calendar -->
    <div class="tab-panel active" id="tab-calendar">
      <div class="card">
        <h2>點選日期以設定開放時段</h2>
        <div class="month-nav">
          <button class="secondary small" id="prevMonthBtn">← 上個月</button>
          <div class="label" id="monthLabel"></div>
          <button class="secondary small" id="nextMonthBtn">下個月 →</button>
        </div>
        <div class="cal-grid" id="calGrid"></div>

        <div class="slot-edit-panel hide" id="slotEditPanel">
          <div class="date-title" id="slotEditDate"></div>
          <div class="toggle-row">
            <div class="toggle-btn" id="editAmBtn">上午開放</div>
            <div class="toggle-btn" id="editPmBtn">下午開放</div>
          </div>
          <div style="display:flex;gap:8px;">
            <button class="primary small" id="saveSlotBtn">儲存</button>
            <button class="danger small" id="clearSlotBtn">取消開放此日</button>
          </div>
        </div>
      </div>
    </div>

    <!-- Tab: Submissions -->
    <div class="tab-panel" id="tab-submissions">
      <div class="card">
        <div class="table-toolbar">
          <div class="count-badge" id="countBadge">共 0 筆</div>
          <div style="display:flex;gap:8px;">
            <button class="secondary small" id="refreshBtn">重新整理</button>
            <button class="primary small" id="exportBtn">匯出 CSV</button>
          </div>
        </div>
        <div id="submissionsArea"><div class="empty-state">載入中…</div></div>
      </div>
    </div>

    <footer>訪查排程管理後台</footer>
  </div>
</div>

<!-- Edit submission modal -->
<div class="modal-overlay" id="editOverlay">
  <div class="modal">
    <h3>編輯業者資料</h3>
    <div class="row2">
      <div class="field"><label>管制編號</label><input type="text" id="edControlNo"></div>
      <div class="field"><label>工廠名稱</label><input type="text" id="edFactoryName"></div>
    </div>
    <div class="field"><label>工廠住址</label><input type="text" id="edAddress"></div>
    <div class="row2">
      <div class="field"><label>聯絡人姓名</label><input type="text" id="edContactName"></div>
      <div class="field"><label>聯絡人電話</label><input type="text" id="edContactPhone"></div>
    </div>
    <div class="field"><label>聯絡人 Email</label><input type="text" id="edContactEmail"></div>
    <div class="field"><label>備註</label><textarea id="edNotes"></textarea></div>
    <div class="field">
      <label>可配合時段</label>
      <div id="edAvailability"></div>
    </div>
    <div class="msg err" id="editMsg"></div>
    <div class="modal-actions">
      <button class="secondary" id="cancelEditBtn">取消</button>
      <button class="primary" id="saveEditBtn">儲存變更</button>
    </div>
  </div>
</div>

<script src="config.js"></script>
<script>
const SUPABASE_URL = window.SCHEDULER_CONFIG.SUPABASE_URL;
const SUPABASE_ANON_KEY = window.SCHEDULER_CONFIG.SUPABASE_ANON_KEY;

let session = JSON.parse(sessionStorage.getItem('admin_session') || 'null');
let campaign = null;
let openSlotsMap = {}; // date -> {am, pm}
let submissions = [];
let viewYear, viewMonth; // 0-indexed month
let selectedDate = null;
const DOW = ['日','一','二','三','四','五','六'];

async function sb(path, opts={}){
  const res = await fetch(`${SUPABASE_URL}/rest/v1/${path}`, {
    ...opts,
    headers:{
      'apikey': SUPABASE_ANON_KEY,
      'Authorization': `Bearer ${SUPABASE_ANON_KEY}`,
      'Content-Type':'application/json',
      ...(opts.headers||{})
    }
  });
  if(!res.ok){ throw new Error(await res.text() || res.statusText); }
  const raw = await res.text();
  if(!raw) return null;
  try{ return JSON.parse(raw); }catch{ return null; }
}

async function sbRpc(fn, body){
  const res = await fetch(`${SUPABASE_URL}/rest/v1/rpc/${fn}`, {
    method:'POST',
    headers:{
      'apikey': SUPABASE_ANON_KEY,
      'Authorization': `Bearer ${SUPABASE_ANON_KEY}`,
      'Content-Type':'application/json'
    },
    body: JSON.stringify(body)
  });
  const text = await res.text();
  let data; try{ data = JSON.parse(text); }catch{ data = text; }
  if(!res.ok){
    const msg = (data && data.message) ? data.message : (typeof data === 'string' ? data : res.statusText);
    throw new Error(msg);
  }
  return data;
}

function showMsg(id, text){
  const el = document.getElementById(id);
  el.textContent = text;
  el.classList.add('show');
}
function hideMsg(id){ document.getElementById(id).classList.remove('show'); }

// ===== Login =====
document.getElementById('showCreateBtn').addEventListener('click', ()=>{
  document.getElementById('createPanel').classList.toggle('hide');
});

document.getElementById('loginBtn').addEventListener('click', async ()=>{
  hideMsg('loginMsg');
  const code = document.getElementById('loginCode').value.trim();
  const password = document.getElementById('loginPassword').value;
  if(!code || !password){ showMsg('loginMsg','請輸入案件代碼與密碼'); return; }
  try{
    const rows = await sbRpc('verify_campaign_password', {p_code: code, p_password: password});
    if(!rows || rows.length === 0 || !rows[0].ok){
      showMsg('loginMsg','案件代碼或密碼錯誤');
      return;
    }
    session = {code, password, campaignId: rows[0].campaign_id, campaignName: rows[0].campaign_name};
    sessionStorage.setItem('admin_session', JSON.stringify(session));
    await enterDashboard();
  }catch(e){
    showMsg('loginMsg','登入失敗：' + e.message);
  }
});

document.getElementById('createBtn').addEventListener('click', async ()=>{
  hideMsg('createMsg');
  const code = document.getElementById('newCode').value.trim();
  const name = document.getElementById('newName').value.trim();
  const password = document.getElementById('newPassword').value;
  if(!code || !name || !password){ showMsg('createMsg','請完整填寫所有欄位'); return; }
  if(!/^[a-zA-Z0-9-_]+$/.test(code)){ showMsg('createMsg','案件代碼僅能使用英數字、連字號、底線'); return; }
  try{
    const newId = await sbRpc('admin_create_campaign', {p_code: code, p_name: name, p_password: password});
    session = {code, password, campaignId: newId, campaignName: name};
    sessionStorage.setItem('admin_session', JSON.stringify(session));
    await enterDashboard();
  }catch(e){
    showMsg('createMsg','建立失敗：' + e.message + '（案件代碼可能已被使用）');
  }
});

document.getElementById('logoutBtn').addEventListener('click', ()=>{
  sessionStorage.removeItem('admin_session');
  session = null;
  document.getElementById('dashboard').classList.add('hide');
  document.getElementById('loginScreen').classList.remove('hide');
});

async function enterDashboard(){
  document.getElementById('loginScreen').classList.add('hide');
  document.getElementById('dashboard').classList.remove('hide');
  document.getElementById('dashCaseName').textContent = `案件：${session.campaignName}（代碼：${session.code}）`;

  const rows = await sb(`campaigns_public?code=eq.${encodeURIComponent(session.code)}&select=*`);
  campaign = rows[0];

  const now = new Date();
  viewYear = now.getFullYear();
  viewMonth = now.getMonth();

  await loadOpenSlots();
  renderCalendar();
  await loadSubmissions();
}

// ===== Tabs =====
document.querySelectorAll('.tab-btn').forEach(btn=>{
  btn.addEventListener('click', ()=>{
    document.querySelectorAll('.tab-btn').forEach(b=>b.classList.remove('active'));
    document.querySelectorAll('.tab-panel').forEach(p=>p.classList.remove('active'));
    btn.classList.add('active');
    document.getElementById('tab-' + btn.dataset.tab).classList.add('active');
  });
});

// ===== Copy link =====
document.getElementById('copyLinkBtn').addEventListener('click', ()=>{
  const url = new URL('index.html', location.href);
  url.searchParams.set('case', session.code);
  navigator.clipboard.writeText(url.toString()).then(()=>{
    alert('已複製業者填寫連結：\n' + url.toString());
  }).catch(()=>{
    prompt('請手動複製連結：', url.toString());
  });
});

// ===== Calendar setup =====
async function loadOpenSlots(){
  const rows = await sb(`open_slots?campaign_id=eq.${session.campaignId}&select=*`);
  openSlotsMap = {};
  rows.forEach(r=>{ openSlotsMap[r.slot_date] = {am: r.am_enabled, pm: r.pm_enabled}; });
}

function renderCalendar(){
  document.getElementById('monthLabel').textContent = `${viewYear} 年 ${viewMonth+1} 月`;
  const grid = document.getElementById('calGrid');
  grid.innerHTML = '';
  DOW.forEach(d=>{
    const el = document.createElement('div');
    el.className = 'cal-dow';
    el.textContent = d;
    grid.appendChild(el);
  });

  const firstDay = new Date(viewYear, viewMonth, 1);
  const startOffset = firstDay.getDay();
  const daysInMonth = new Date(viewYear, viewMonth+1, 0).getDate();

  for(let i=0;i<startOffset;i++){
    const el = document.createElement('div');
    el.className = 'cal-day outside';
    grid.appendChild(el);
  }

  for(let d=1; d<=daysInMonth; d++){
    const dateStr = `${viewYear}-${String(viewMonth+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
    const slot = openSlotsMap[dateStr];
    const el = document.createElement('div');
    el.className = 'cal-day' + (slot && (slot.am||slot.pm) ? ' has-open' : '');
    el.innerHTML = `<div class="d-num">${d}</div>` +
      (slot ? `
        <div class="pill ${slot.am?'on':''}">${campaign.am_label}</div>
        <div class="pill ${slot.pm?'on':''}">${campaign.pm_label}</div>
      ` : '');
    el.addEventListener('click', ()=> openSlotEditor(dateStr));
    grid.appendChild(el);
  }
}

document.getElementById('prevMonthBtn').addEventListener('click', ()=>{
  viewMonth--; if(viewMonth<0){viewMonth=11; viewYear--;}
  renderCalendar();
});
document.getElementById('nextMonthBtn').addEventListener('click', ()=>{
  viewMonth++; if(viewMonth>11){viewMonth=0; viewYear++;}
  renderCalendar();
});

function openSlotEditor(dateStr){
  selectedDate = dateStr;
  const slot = openSlotsMap[dateStr] || {am:false, pm:false};
  document.getElementById('slotEditPanel').classList.remove('hide');
  const dt = new Date(dateStr + 'T00:00:00');
  document.getElementById('slotEditDate').textContent = `${dateStr}（週${DOW[dt.getDay()]}）`;
  document.getElementById('editAmBtn').classList.toggle('on', slot.am);
  document.getElementById('editPmBtn').classList.toggle('on', slot.pm);
}

document.getElementById('editAmBtn').addEventListener('click', function(){ this.classList.toggle('on'); });
document.getElementById('editPmBtn').addEventListener('click', function(){ this.classList.toggle('on'); });

document.getElementById('saveSlotBtn').addEventListener('click', async ()=>{
  const am = document.getElementById('editAmBtn').classList.contains('on');
  const pm = document.getElementById('editPmBtn').classList.contains('on');
  try{
    await sbRpc('admin_upsert_open_slot', {p_code: session.code, p_password: session.password, p_date: selectedDate, p_am: am, p_pm: pm});
    openSlotsMap[selectedDate] = {am, pm};
    renderCalendar();
    document.getElementById('slotEditPanel').classList.add('hide');
  }catch(e){
    alert('儲存失敗：' + e.message);
  }
});

document.getElementById('clearSlotBtn').addEventListener('click', async ()=>{
  try{
    await sbRpc('admin_delete_open_slot', {p_code: session.code, p_password: session.password, p_date: selectedDate});
    delete openSlotsMap[selectedDate];
    renderCalendar();
    document.getElementById('slotEditPanel').classList.add('hide');
  }catch(e){
    alert('取消失敗：' + e.message);
  }
});

// ===== Submissions =====
async function loadSubmissions(){
  const area = document.getElementById('submissionsArea');
  area.innerHTML = '<div class="empty-state">載入中…</div>';
  try{
    submissions = await sb(`submissions?campaign_id=eq.${session.campaignId}&order=created_at.desc&select=*`);
    renderSubmissions();
  }catch(e){
    area.innerHTML = `<div class="empty-state">載入失敗：${e.message}</div>`;
  }
}

function fmtAvail(av){
  if(!av || av.length===0) return '（無）';
  return av.map(a=>{
    const periods = [a.am?campaign.am_label:null, a.pm?campaign.pm_label:null].filter(Boolean).join('/');
    return `<span class="avail-tag">${a.date} ${periods}</span>`;
  }).join('');
}

function renderSubmissions(){
  document.getElementById('countBadge').textContent = `共 ${submissions.length} 筆`;
  const area = document.getElementById('submissionsArea');
  if(submissions.length === 0){
    area.innerHTML = '<div class="empty-state">尚無業者填寫資料</div>';
    return;
  }
  let html = `<div style="overflow-x:auto;"><table class="data"><thead><tr>
    <th>管制編號</th><th>工廠名稱</th><th>住址</th><th>聯絡人</th><th>電話</th><th>可配合時段</th><th>備註</th><th>操作</th>
  </tr></thead><tbody>`;
  for(const s of submissions){
    html += `<tr>
      <td>${s.control_no}</td>
      <td>${s.factory_name}</td>
      <td>${s.address}</td>
      <td>${s.contact_name}</td>
      <td>${s.contact_phone}</td>
      <td>${fmtAvail(s.availability)}</td>
      <td>${s.notes || ''}</td>
      <td class="row-actions">
        <button class="secondary small" data-edit="${s.id}">編輯</button>
        <button class="danger small" data-del="${s.id}">刪除</button>
      </td>
    </tr>`;
  }
  html += '</tbody></table></div>';
  area.innerHTML = html;

  area.querySelectorAll('[data-edit]').forEach(b=>b.addEventListener('click', ()=>openEditModal(b.dataset.edit)));
  area.querySelectorAll('[data-del]').forEach(b=>b.addEventListener('click', ()=>deleteSubmission(b.dataset.del)));
}

document.getElementById('refreshBtn').addEventListener('click', loadSubmissions);

async function deleteSubmission(id){
  if(!confirm('確定要刪除這筆業者資料嗎？此動作無法復原。')) return;
  try{
    await sbRpc('admin_delete_submission', {p_code: session.code, p_password: session.password, p_id: id});
    submissions = submissions.filter(s=>s.id !== id);
    renderSubmissions();
  }catch(e){
    alert('刪除失敗：' + e.message);
  }
}

let editingId = null;
function openEditModal(id){
  const s = submissions.find(x=>x.id===id);
  if(!s) return;
  editingId = id;
  document.getElementById('edControlNo').value = s.control_no;
  document.getElementById('edFactoryName').value = s.factory_name;
  document.getElementById('edAddress').value = s.address;
  document.getElementById('edContactName').value = s.contact_name;
  document.getElementById('edContactPhone').value = s.contact_phone;
  document.getElementById('edContactEmail').value = s.contact_email || '';
  document.getElementById('edNotes').value = s.notes || '';

  const avDiv = document.getElementById('edAvailability');
  const av = s.availability || [];
  if(av.length === 0){
    avDiv.innerHTML = '<div style="font-size:13px;color:var(--ink-soft);">（無已勾選時段）</div>';
  }else{
    avDiv.innerHTML = av.map((a,i)=>{
      const dt = new Date(a.date+'T00:00:00');
      return `<div class="toggle-row" data-idx="${i}" style="margin-bottom:6px;">
        <div style="flex:0 0 110px;font-size:13px;padding-top:9px;">${a.date}（週${DOW[dt.getDay()]}）</div>
        <div class="toggle-btn am-toggle ${a.am?'on':''}" style="flex:1;">${campaign.am_label}</div>
        <div class="toggle-btn pm-toggle ${a.pm?'on':''}" style="flex:1;">${campaign.pm_label}</div>
      </div>`;
    }).join('');
    avDiv.querySelectorAll('.am-toggle, .pm-toggle').forEach(el=>{
      el.addEventListener('click', function(){ this.classList.toggle('on'); });
    });
  }

  hideMsg('editMsg');
  document.getElementById('editOverlay').classList.add('show');
}

document.getElementById('cancelEditBtn').addEventListener('click', ()=>{
  document.getElementById('editOverlay').classList.remove('show');
});

document.getElementById('saveEditBtn').addEventListener('click', async ()=>{
  const s = submissions.find(x=>x.id===editingId);
  const avRows = document.querySelectorAll('#edAvailability .toggle-row');
  const availability = Array.from(avRows).map((row,i)=>({
    date: s.availability[i].date,
    am: row.querySelector('.am-toggle').classList.contains('on'),
    pm: row.querySelector('.pm-toggle').classList.contains('on')
  }));

  const payload = {
    p_code: session.code,
    p_password: session.password,
    p_id: editingId,
    p_control_no: document.getElementById('edControlNo').value.trim(),
    p_factory_name: document.getElementById('edFactoryName').value.trim(),
    p_address: document.getElementById('edAddress').value.trim(),
    p_contact_name: document.getElementById('edContactName').value.trim(),
    p_contact_phone: document.getElementById('edContactPhone').value.trim(),
    p_contact_email: document.getElementById('edContactEmail').value.trim() || null,
    p_notes: document.getElementById('edNotes').value.trim() || null,
    p_availability: availability
  };

  try{
    await sbRpc('admin_update_submission', payload);
    document.getElementById('editOverlay').classList.remove('show');
    await loadSubmissions();
  }catch(e){
    showMsg('editMsg', '儲存失敗：' + e.message);
  }
});

// ===== Export CSV =====
document.getElementById('exportBtn').addEventListener('click', ()=>{
  if(submissions.length === 0){ alert('目前沒有資料可匯出'); return; }
  const headers = ['管制編號','工廠名稱','住址','聯絡人','電話','Email','可配合時段','備註'];
  const rows = submissions.map(s=>{
    const avail = (s.availability||[]).map(a=>{
      const periods = [a.am?campaign.am_label:null, a.pm?campaign.pm_label:null].filter(Boolean).join('/');
      return `${a.date} ${periods}`;
    }).join('；');
    return [s.control_no, s.factory_name, s.address, s.contact_name, s.contact_phone, s.contact_email||'', avail, s.notes||''];
  });
  const csvLines = [headers, ...rows].map(r =>
    r.map(cell => `"${String(cell).replace(/"/g,'""')}"`).join(',')
  );
  const csvContent = '\uFEFF' + csvLines.join('\r\n');
  const blob = new Blob([csvContent], {type:'text/csv;charset=utf-8'});
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = `訪查預約彙整_${session.code}.csv`;
  a.click();
});

// ===== Init =====
(async function init(){
  if(session && session.code && session.password){
    try{
      const rows = await sbRpc('verify_campaign_password', {p_code: session.code, p_password: session.password});
      if(rows && rows.length && rows[0].ok){
        session.campaignId = rows[0].campaign_id;
        session.campaignName = rows[0].campaign_name;
        await enterDashboard();
        return;
      }
    }catch(e){ /* fall through to login */ }
    sessionStorage.removeItem('admin_session');
    session = null;
  }
})();
</script>
