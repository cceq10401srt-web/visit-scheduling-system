<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>現場訪查時間預約</title>
<style>
  :root{
    --ink:#1f2937;
    --ink-soft:#5b6472;
    --line:#dfe3e8;
    --line-strong:#c4cad3;
    --bg:#f5f6f8;
    --card:#ffffff;
    --accent:#2f5fa3;
    --accent-soft:#eaf1fb;
    --accent-strong:#1e4474;
    --warn-bg:#fdece9;
    --warn-text:#a3341f;
    --ok-bg:#e9f5ee;
    --ok-text:#1f6b43;
    --radius:10px;
    font-family: -apple-system, "Segoe UI", "Noto Sans TC", "PingFang TC", "Microsoft JhengHei", sans-serif;
  }
  *{box-sizing:border-box;}
  body{
    margin:0;
    background:var(--bg);
    color:var(--ink);
    line-height:1.6;
    padding:24px 16px 80px;
  }
  .wrap{max-width:760px;margin:0 auto;}
  .header{
    margin-bottom:24px;
  }
  .eyebrow{
    font-size:13px;
    color:var(--accent-strong);
    letter-spacing:.04em;
    font-weight:600;
    margin-bottom:6px;
  }
  h1{
    font-size:22px;
    margin:0 0 8px;
    font-weight:700;
  }
  .sub{
    color:var(--ink-soft);
    font-size:14px;
  }
  .card{
    background:var(--card);
    border:1px solid var(--line);
    border-radius:var(--radius);
    padding:22px 20px;
    margin-bottom:18px;
  }
  .card h2{
    font-size:15px;
    margin:0 0 16px;
    font-weight:700;
    display:flex;
    align-items:center;
    gap:8px;
  }
  .card h2 .num{
    width:22px;height:22px;border-radius:50%;
    background:var(--accent);color:#fff;
    font-size:12px;display:inline-flex;align-items:center;justify-content:center;
    flex-shrink:0;
  }
  label{
    display:block;
    font-size:13px;
    font-weight:600;
    color:var(--ink-soft);
    margin:14px 0 5px;
  }
  label:first-of-type{margin-top:0;}
  label .req{color:#c0392b;margin-left:2px;}
  input[type=text], input[type=tel], input[type=email], textarea{
    width:100%;
    padding:9px 11px;
    border:1px solid var(--line-strong);
    border-radius:8px;
    font-size:14px;
    font-family:inherit;
    color:var(--ink);
    background:#fff;
  }
  input:focus, textarea:focus{
    outline:none;
    border-color:var(--accent);
    box-shadow:0 0 0 3px var(--accent-soft);
  }
  textarea{resize:vertical;min-height:64px;}
  .row2{display:grid;grid-template-columns:1fr 1fr;gap:14px;}
  @media (max-width:560px){.row2{grid-template-columns:1fr;}}

  .cal-table{width:100%;border-collapse:collapse;font-size:13.5px;}
  .cal-table th{
    text-align:left;
    font-weight:600;
    color:var(--ink-soft);
    padding:8px 6px;
    border-bottom:1px solid var(--line);
  }
  .cal-table td{
    padding:9px 6px;
    border-bottom:1px solid var(--line);
    vertical-align:middle;
  }
  .cal-table tr:last-child td{border-bottom:none;}
  .date-cell{font-weight:600;white-space:nowrap;}
  .date-cell .dow{font-weight:400;color:var(--ink-soft);margin-left:4px;}
  .slot-btn{
    display:inline-flex;
    align-items:center;
    justify-content:center;
    width:100%;
    padding:8px 4px;
    border:1px solid var(--line-strong);
    border-radius:8px;
    background:#fff;
    cursor:pointer;
    font-size:13px;
    font-weight:600;
    color:var(--ink-soft);
    user-select:none;
    transition:background .12s, border-color .12s, color .12s;
  }
  .slot-btn.selected{
    background:var(--accent);
    border-color:var(--accent);
    color:#fff;
  }
  .slot-btn.disabled{
    background:#f1f2f4;
    border-color:var(--line);
    color:#c2c7cd;
    cursor:not-allowed;
  }
  .slot-cell{width:84px;}

  .empty-state{
    text-align:center;
    padding:32px 16px;
    color:var(--ink-soft);
    font-size:14px;
  }

  .submit-bar{
    display:flex;
    align-items:center;
    gap:12px;
    margin-top:6px;
  }
  button.primary{
    background:var(--accent);
    color:#fff;
    border:none;
    padding:11px 22px;
    border-radius:8px;
    font-size:14.5px;
    font-weight:700;
    cursor:pointer;
    font-family:inherit;
  }
  button.primary:hover{background:var(--accent-strong);}
  button.primary:disabled{background:#b7bfc9;cursor:not-allowed;}

  .msg{
    font-size:13px;
    padding:10px 12px;
    border-radius:8px;
    margin-bottom:14px;
    display:none;
  }
  .msg.show{display:block;}
  .msg.err{background:var(--warn-bg);color:var(--warn-text);}
  .msg.ok{background:var(--ok-bg);color:var(--ok-text);}

  .selected-summary{
    font-size:13px;
    color:var(--ink-soft);
    margin-top:10px;
  }

  .done-screen{display:none;}
  .done-screen.show{display:block;}
  .form-screen.hide{display:none;}

  .done-card{
    background:var(--card);
    border:1px solid var(--line);
    border-radius:var(--radius);
    padding:28px 24px;
    text-align:center;
  }
  .done-card .icon{
    width:48px;height:48px;border-radius:50%;
    background:var(--ok-bg);color:var(--ok-text);
    display:flex;align-items:center;justify-content:center;
    margin:0 auto 14px;font-size:24px;font-weight:700;
  }
  .done-card h2{font-size:17px;margin:0 0 8px;}
  .done-card p{color:var(--ink-soft);font-size:13.5px;margin:0 0 18px;}
  .download-row{display:flex;gap:10px;justify-content:center;flex-wrap:wrap;}
  button.secondary{
    background:#fff;
    border:1px solid var(--line-strong);
    color:var(--ink);
    padding:10px 18px;
    border-radius:8px;
    font-size:13.5px;
    font-weight:600;
    cursor:pointer;
    font-family:inherit;
  }
  button.secondary:hover{background:var(--bg);}

  .receipt{
    text-align:left;
    border:1px solid var(--line);
    border-radius:8px;
    padding:16px 18px;
    margin:18px 0;
    font-size:13px;
    background:#fbfbfc;
  }
  .receipt dl{margin:0;display:grid;grid-template-columns:90px 1fr;row-gap:6px;column-gap:8px;}
  .receipt dt{color:var(--ink-soft);}
  .receipt dd{margin:0;}

  footer{
    text-align:center;
    font-size:12px;
    color:#9aa2ab;
    margin-top:30px;
  }
</style>
</head>
<body>
<div class="wrap">

  <div class="header">
    <div class="eyebrow" id="campaignEyebrow">現場訪查時間預約</div>
    <h1 id="campaignTitle">載入中…</h1>
    <div class="sub">請填寫工廠基本資料，並勾選可配合訪查的日期時段（上午／下午）。送出後請下載資料並以 email 寄回承辦人員。</div>
  </div>

  <div id="loadError" class="msg err"></div>

  <div class="form-screen" id="formScreen">

    <div class="card">
      <h2><span class="num">1</span>工廠基本資料</h2>

      <label>管制編號<span class="req">*</span></label>
      <input type="text" id="controlNo" placeholder="例如 A0123456789">

      <label>工廠名稱<span class="req">*</span></label>
      <input type="text" id="factoryName" placeholder="請輸入工廠全銜">

      <label>工廠住址<span class="req">*</span></label>
      <input type="text" id="address" placeholder="請輸入工廠地址">

      <div class="row2">
        <div>
          <label>聯絡人姓名<span class="req">*</span></label>
          <input type="text" id="contactName" placeholder="姓名">
        </div>
        <div>
          <label>聯絡人電話<span class="req">*</span></label>
          <input type="tel" id="contactPhone" placeholder="0912-345-678">
        </div>
      </div>

      <label>聯絡人 Email</label>
      <input type="email" id="contactEmail" placeholder="name@company.com">

      <label>備註</label>
      <textarea id="notes" placeholder="如有特殊狀況請於此說明（選填）"></textarea>
    </div>

    <div class="card">
      <h2><span class="num">2</span>可配合訪查時段</h2>
      <div id="calendarArea">
        <div class="empty-state">載入開放時段中…</div>
      </div>
      <div class="selected-summary" id="selectedSummary"></div>
    </div>

    <div class="msg err" id="submitMsg"></div>

    <div class="submit-bar">
      <button class="primary" id="submitBtn">送出預約資料</button>
    </div>
  </div>

  <div class="done-screen" id="doneScreen">
    <div class="done-card">
      <div class="icon">✓</div>
      <h2>已送出，請下載資料並回傳</h2>
      <p>請點選下方按鈕下載 PDF 或文字檔，並以 email 寄送給承辦人員，以完成預約程序。</p>
      <div class="receipt" id="receiptArea"></div>
      <div class="download-row">
        <button class="secondary" id="downloadPdfBtn">下載 PDF</button>
        <button class="secondary" id="downloadTxtBtn">下載文字檔</button>
      </div>
    </div>
  </div>

  <footer>本系統僅供工廠訪查排程使用</footer>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<script src="config.js"></script>
<script>
const SUPABASE_URL = window.SCHEDULER_CONFIG.SUPABASE_URL;
const SUPABASE_ANON_KEY = window.SCHEDULER_CONFIG.SUPABASE_ANON_KEY;

const params = new URLSearchParams(location.search);
const campaignCode = params.get('case') || window.SCHEDULER_CONFIG.DEFAULT_CAMPAIGN_CODE || '';

let campaign = null;
let openSlots = [];
const selection = {}; // { '2026-07-06': {am:true, pm:false} }

const DOW = ['日','一','二','三','四','五','六'];

function fmtDate(d){
  const dt = new Date(d + 'T00:00:00');
  return `${dt.getMonth()+1}/${dt.getDate()}`;
}

async function sb(path, opts={}){
  const res = await fetch(`${SUPABASE_URL}/rest/v1/${path}`, {
    ...opts,
    headers:{
      'apikey': SUPABASE_ANON_KEY,
      'Authorization': `Bearer ${SUPABASE_ANON_KEY}`,
      'Content-Type':'application/json',
      ...(opts.headers||{})
    }
  });
  if(!res.ok){
    const t = await res.text();
    throw new Error(t || res.statusText);
  }
  return res.status === 204 ? null : res.json();
}

async function sbRpc(fn, body){
  const res = await fetch(`${SUPABASE_URL}/rest/v1/rpc/${fn}`, {
    method:'POST',
    headers:{
      'apikey': SUPABASE_ANON_KEY,
      'Authorization': `Bearer ${SUPABASE_ANON_KEY}`,
      'Content-Type':'application/json'
    },
    body: JSON.stringify(body)
  });
  const data = await res.json().catch(()=>null);
  if(!res.ok){
    throw new Error((data && data.message) || res.statusText);
  }
  return data;
}

function showLoadError(msg){
  const el = document.getElementById('loadError');
  el.textContent = msg;
  el.classList.add('show');
  document.getElementById('formScreen').style.display = 'none';
}

async function loadCampaign(){
  if(!campaignCode){
    showLoadError('連結缺少案件代碼，請向承辦人員確認正確的填寫連結。');
    return;
  }
  try{
    const rows = await sb(`campaigns_public?code=eq.${encodeURIComponent(campaignCode)}&select=*`);
    if(!rows || rows.length === 0){
      showLoadError('找不到此案件，請確認連結是否正確。');
      return;
    }
    campaign = rows[0];
    document.getElementById('campaignTitle').textContent = campaign.name;
    document.getElementById('campaignEyebrow').textContent = '現場訪查時間預約';
    await loadOpenSlots();
  }catch(e){
    showLoadError('載入案件資料失敗：' + e.message);
  }
}

async function loadOpenSlots(){
  const rows = await sb(`open_slots?campaign_id=eq.${campaign.id}&order=slot_date.asc&select=*`);
  openSlots = rows.filter(r => r.am_enabled || r.pm_enabled);
  renderCalendar();
}

function renderCalendar(){
  const area = document.getElementById('calendarArea');
  if(openSlots.length === 0){
    area.innerHTML = '<div class="empty-state">目前尚無開放的訪查日期，請洽承辦人員。</div>';
    return;
  }
  let html = `<table class="cal-table"><thead><tr>
    <th>日期</th><th class="slot-cell">${campaign.am_label}</th><th class="slot-cell">${campaign.pm_label}</th>
  </tr></thead><tbody>`;
  for(const slot of openSlots){
    const dt = new Date(slot.slot_date + 'T00:00:00');
    html += `<tr>
      <td class="date-cell">${fmtDate(slot.slot_date)}<span class="dow">週${DOW[dt.getDay()]}</span></td>
      <td class="slot-cell">${slot.am_enabled ? `<div class="slot-btn" data-date="${slot.slot_date}" data-period="am">可配合</div>` : `<div class="slot-btn disabled">未開放</div>`}</td>
      <td class="slot-cell">${slot.pm_enabled ? `<div class="slot-btn" data-date="${slot.slot_date}" data-period="pm">可配合</div>` : `<div class="slot-btn disabled">未開放</div>`}</td>
    </tr>`;
  }
  html += '</tbody></table>';
  area.innerHTML = html;

  area.querySelectorAll('.slot-btn[data-date]').forEach(btn=>{
    btn.addEventListener('click', ()=>{
      const date = btn.dataset.date;
      const period = btn.dataset.period;
      if(!selection[date]) selection[date] = {am:false, pm:false};
      selection[date][period] = !selection[date][period];
      btn.classList.toggle('selected', selection[date][period]);
      updateSummary();
    });
  });
  updateSummary();
}

function updateSummary(){
  const dates = Object.keys(selection).filter(d => selection[d].am || selection[d].pm);
  const el = document.getElementById('selectedSummary');
  if(dates.length === 0){
    el.textContent = '尚未勾選任何時段';
    return;
  }
  const parts = dates.map(d=>{
    const s = selection[d];
    const periods = [s.am ? campaign.am_label : null, s.pm ? campaign.pm_label : null].filter(Boolean).join('、');
    return `${fmtDate(d)}（${periods}）`;
  });
  el.textContent = `已選擇 ${dates.length} 天：` + parts.join('，');
}

function buildAvailabilityArray(){
  return Object.keys(selection)
    .filter(d => selection[d].am || selection[d].pm)
    .sort()
    .map(d => ({date:d, am:!!selection[d].am, pm:!!selection[d].pm}));
}

function validate(){
  const required = [
    ['controlNo','管制編號'],
    ['factoryName','工廠名稱'],
    ['address','工廠住址'],
    ['contactName','聯絡人姓名'],
    ['contactPhone','聯絡人電話']
  ];
  for(const [id, label] of required){
    if(!document.getElementById(id).value.trim()){
      return `請填寫「${label}」`;
    }
  }
  if(buildAvailabilityArray().length === 0){
    return '請至少勾選一個可配合的時段';
  }
  return null;
}

let lastSubmission = null;

document.getElementById('submitBtn').addEventListener('click', async ()=>{
  const errEl = document.getElementById('submitMsg');
  errEl.classList.remove('show');

  const err = validate();
  if(err){
    errEl.textContent = err;
    errEl.classList.add('show');
    return;
  }

  const payload = {
    campaign_id: campaign.id,
    control_no: document.getElementById('controlNo').value.trim(),
    factory_name: document.getElementById('factoryName').value.trim(),
    address: document.getElementById('address').value.trim(),
    contact_name: document.getElementById('contactName').value.trim(),
    contact_phone: document.getElementById('contactPhone').value.trim(),
    contact_email: document.getElementById('contactEmail').value.trim() || null,
    notes: document.getElementById('notes').value.trim() || null,
    availability: buildAvailabilityArray()
  };

  const btn = document.getElementById('submitBtn');
  btn.disabled = true;
  btn.textContent = '送出中…';

  try{
    await sb('submissions', {method:'POST', headers:{'Prefer':'return=minimal'}, body: JSON.stringify(payload)});
    lastSubmission = payload;
    showDoneScreen(payload);
  }catch(e){
    errEl.textContent = '送出失敗：' + e.message;
    errEl.classList.add('show');
    btn.disabled = false;
    btn.textContent = '送出預約資料';
  }
});

function availabilityText(av){
  return av.map(a=>{
    const periods = [a.am ? campaign.am_label : null, a.pm ? campaign.pm_label : null].filter(Boolean).join('、');
    return `${a.date}（週${DOW[new Date(a.date+'T00:00:00').getDay()]}）：${periods}`;
  }).join('\n');
}

function showDoneScreen(payload){
  document.getElementById('formScreen').classList.add('hide');
  document.getElementById('doneScreen').classList.add('show');

  const receiptEl = document.getElementById('receiptArea');
  receiptEl.innerHTML = `<dl>
    <dt>案件</dt><dd>${campaign.name}</dd>
    <dt>管制編號</dt><dd>${payload.control_no}</dd>
    <dt>工廠名稱</dt><dd>${payload.factory_name}</dd>
    <dt>住址</dt><dd>${payload.address}</dd>
    <dt>聯絡人</dt><dd>${payload.contact_name}（${payload.contact_phone}）</dd>
    <dt>可配合時段</dt><dd style="white-space:pre-line">${availabilityText(payload.availability)}</dd>
  </dl>`;
}

document.getElementById('downloadTxtBtn').addEventListener('click', ()=>{
  if(!lastSubmission) return;
  const p = lastSubmission;
  const text =
`現場訪查時間預約回條
案件：${campaign.name}

管制編號：${p.control_no}
工廠名稱：${p.factory_name}
工廠住址：${p.address}
聯絡人：${p.contact_name}
聯絡電話：${p.contact_phone}
聯絡 Email：${p.contact_email || '（未填）'}
備註：${p.notes || '（無）'}

可配合訪查時段：
${availabilityText(p.availability)}
`;
  const blob = new Blob([text], {type:'text/plain;charset=utf-8'});
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = `訪查預約回條_${p.factory_name}.txt`;
  a.click();
});

document.getElementById('downloadPdfBtn').addEventListener('click', ()=>{
  if(!lastSubmission) return;
  const p = lastSubmission;
  const { jsPDF } = window.jspdf;
  const doc = new jsPDF();
  doc.setFont('helvetica');
  let y = 20;
  const line = (txt, size=11, gap=8)=>{
    doc.setFontSize(size);
    doc.text(txt, 15, y);
    y += gap;
  };
  line('Site Visit Scheduling Receipt', 15, 12);
  line(`Case: ${campaign.name}`);
  line(`Control No: ${p.control_no}`);
  line(`Factory: ${p.factory_name}`);
  line(`Address: ${p.address}`);
  line(`Contact: ${p.contact_name} (${p.contact_phone})`);
  line(`Email: ${p.contact_email || 'N/A'}`);
  line(`Notes: ${p.notes || 'N/A'}`);
  y += 4;
  line('Available time slots:', 12, 8);
  p.availability.forEach(a=>{
    const periods = [a.am ? 'AM' : null, a.pm ? 'PM' : null].filter(Boolean).join(', ');
    line(`  ${a.date}: ${periods}`, 10, 7);
  });
  doc.save(`site-visit-receipt_${p.factory_name}.pdf`);
});

loadCampaign();
</script>
</body>
</html>
